name: Maven Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        java: [ '17' ]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test netty-gateway-prototype module
        working-directory: netty-gateway-prototype
        run: mvn -T1C -DskipTests=false clean verify
