name: CI (build & test)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make install script executable
        run: chmod +x .github/scripts/install-internal-deps.sh

      - name: Install internal/vendor JARs into local Maven repository
        run: .github/scripts/install-internal-deps.sh

      - name: Build and test
        run: mvn -B -U -DskipTests=false clean package

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          if-no-files-found: ignore

      - name: Upload Failsafe test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: '**/target/failsafe-reports/*.xml'
          if-no-files-found: ignore
