Ice.ProgramName=AuthenticationService

# ICE Locator (Registry)
Ice.Default.Locator=Registry/Locator:tcp -h 127.0.0.1 -p 10000

# Adapter
AuthenticationAdapter.Endpoints=tcp -p 23500
AuthenticationAdapter.ThreadPool.Size=5
AuthenticationAdapter.ThreadPool.SizeMax=50

# Event System
EventSystemProxy=EventSystem:tcp -h 127.0.0.1 -p 21500

# Logging
Ice.Warn.Connections=1
Ice.Warn.Dispatch=2

# Thread pools
Ice.ThreadPool.Server.Size=5
Ice.ThreadPool.Server.SizeMax=25
Ice.ThreadPool.Client.Size=5
Ice.ThreadPool.Client.SizeMax=25
