# OLAP Database Read Configuration for Migmechat
# This configuration is used for OLAP (Online Analytical Processing) operations
#
# NOTE: This configuration uses a different password ('fusionpassword')
# than other database configurations ('root123')
#
# IMPORTANT: If you see "Access denied" error, ensure the MySQL user 'fusion'
# has been granted access from the connecting host.
# Run: mysql -u root -p < sql/setup-database-user.sql

db.driver=com.mysql.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/fusion
db.username=fusion
db.password=fusionpassword
