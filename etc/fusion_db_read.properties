# Database Read Configuration for Migmechat
# This configuration is used for read operations from the database
#
# IMPORTANT: If you see "Access denied for user 'fusion'@'172.17.0.1'" error,
# it means the MySQL user doesn't have permission from the Docker network.
# Run: mysql -u root -p < sql/setup-database-user.sql to fix this.
#
# Docker Network: 172.17.0.2 is typically the MySQL container IP
# Application Container: Usually gets 172.17.0.1 or another IP in 172.17.0.0/16

db.driver=com.mysql.jdbc.Driver
db.url=jdbc:mysql://172.17.0.2:3306/fusion?useSSL=false&autoReconnect=true&useUnicode=true&characterEncoding=UTF-8
db.username=fusion
db.password=root123
